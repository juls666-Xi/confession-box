<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSpace Confessions - Share Anonymously</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(30, 30, 50, 0.6);
            --bg-input: rgba(40, 40, 60, 0.8);
            --text-primary: #ffffff;
            --text-secondary: #b8b8d1;
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        .light-mode {
            --bg-primary: #f8f9fc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --bg-input: rgba(240, 240, 245, 0.9);
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --glass-border: rgba(0, 0, 0, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(99, 102, 241, 0.1) 0%, transparent 40%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        /* Header */
        header {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .icon-btn:hover {
            background: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        /* Main Container */
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Input Section */
        .input-section {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .input-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .anonymous-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: rgba(16, 185, 129, 0.1);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
        }

        .anonymous-badge::before {
            content: 'рҹ”’';
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        textarea::placeholder {
            color: var(--text-secondary);
        }

        .input-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .category-select {
            padding: 0.6rem 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .char-counter {
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .char-counter.warning {
            color: var(--warning);
        }

        .char-counter.danger {
            color: var(--danger);
        }

        .post-btn {
            padding: 0.75rem 2rem;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .post-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        .post-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Filter Section */
        .filter-section {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            background: var(--bg-card);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
        }

        /* Feed Section */
        .feed-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .confession-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            animation: fadeInUp 0.5s ease;
            transition: all 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .confession-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .category-tag {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .category-tag.love { background: rgba(236, 72, 153, 0.2); color: #ec4899; }
        .category-tag.school { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .category-tag.secrets { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
        .category-tag.work { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .category-tag.family { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .category-tag.other { background: rgba(107, 114, 128, 0.2); color: #9ca3af; }

        .timestamp {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .delete-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            opacity: 0;
        }

        .confession-card:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .confession-text {
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .card-actions {
            display: flex;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .action-btn.liked {
            background: rgba(236, 72, 153, 0.1);
            border-color: rgba(236, 72, 153, 0.3);
            color: #ec4899;
        }

        .action-btn.liked:hover {
            background: rgba(236, 72, 153, 0.2);
        }

        .emoji-reactions {
            display: flex;
            gap: 0.5rem;
            margin-left: auto;
        }

        .emoji-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: transparent;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .emoji-btn:hover {
            background: var(--bg-input);
            transform: scale(1.15);
        }

        .emoji-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            margin-top: 2rem;
            border-top: 1px solid var(--glass-border);
        }

        .footer-message {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-style: italic;
            max-width: 500px;
            margin: 0 auto;
        }

        .footer-message::before {
            content: '"';
            font-size: 2rem;
            color: var(--accent-primary);
            line-height: 0;
            vertical-align: middle;
            margin-right: 0.25rem;
        }

        .footer-message::after {
            content: '"';
            font-size: 2rem;
            color: var(--accent-primary);
            line-height: 0;
            vertical-align: middle;
            margin-left: 0.25rem;
        }

        .footer-heart {
            margin-top: 1rem;
            font-size: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            font-size: 1.25rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header {
                padding: 1rem;
            }

            .logo h1 {
                font-size: 1.2rem;
            }

            main {
                padding: 1rem;
            }

            .input-section {
                padding: 1rem;
            }

            .input-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .post-btn {
                width: 100%;
                justify-content: center;
            }

            .confession-card {
                padding: 1rem;
            }

            .delete-btn {
                opacity: 1;
            }

            .emoji-reactions {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">рҹ’ң</div>
                <h1>SafeSpace Confessions</h1>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="themeToggle" title="Toggle Dark Mode">
                    рҹҢҷ
                </button>
            </div>
        </div>
    </header>

    <main>
        <!-- Input Section -->
        <section class="input-section">
            <div class="input-header">
                <h2>Share Your Thoughts</h2>
                <span class="anonymous-badge">Anonymous</span>
            </div>
            <textarea 
                id="confessionInput" 
                placeholder="What's on your mind? Share your thoughts anonymously..."
                maxlength="300"
            ></textarea>
            <div class="input-controls">
                <select class="category-select" id="categorySelect">
                    <option value="love">рҹ’• Love</option>
                    <option value="school">рҹ“ҡ School</option>
                    <option value="secrets">рҹӨ« Secrets</option>
                    <option value="work">рҹ’ј Work</option>
                    <option value="family">рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§вҖҚрҹ‘Ұ Family</option>
                    <option value="other">вңЁ Other</option>
                </select>
                <span class="char-counter" id="charCounter">0 / 300</span>
                <button class="post-btn" id="postBtn">
                    <span>рҹ“Ө</span> Post Confession
                </button>
            </div>
        </section>

        <!-- Filter Section -->
        <section class="filter-section" id="filterSection">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="love">рҹ’• Love</button>
            <button class="filter-btn" data-filter="school">рҹ“ҡ School</button>
            <button class="filter-btn" data-filter="secrets">рҹӨ« Secrets</button>
            <button class="filter-btn" data-filter="work">рҹ’ј Work</button>
            <button class="filter-btn" data-filter="family">рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§вҖҚрҹ‘Ұ Family</button>
            <button class="filter-btn" data-filter="other">вңЁ Other</button>
        </section>

        <!-- Feed Section -->
        <section class="feed-section" id="feedSection">
            <!-- Confessions will be dynamically added here -->
        </section>
    </main>

    <footer>
        <p class="footer-message">You're not alone. Someone out there understands.</p>
        <div class="footer-heart">рҹ’ң</div>
    </footer>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-icon">вң…</span>
        <span id="toastMessage">Confession posted!</span>
    </div>

    <script>
        // State Management
        let confessions = JSON.parse(localStorage.getItem('safespace_confessions')) || [];
        let currentFilter = 'all';
        let isDarkMode = localStorage.getItem('safespace_darkmode') !== 'false';

        // DOM Elements
        const confessionInput = document.getElementById('confessionInput');
        const charCounter = document.getElementById('charCounter');
        const postBtn = document.getElementById('postBtn');
        const categorySelect = document.getElementById('categorySelect');
        const feedSection = document.getElementById('feedSection');
        const filterSection = document.getElementById('filterSection');
        const themeToggle = document.getElementById('themeToggle');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            applyTheme();
            renderConfessions();
            updateCharCounter();
        });

        // Character Counter
        confessionInput.addEventListener('input', updateCharCounter);

        function updateCharCounter() {
            const length = confessionInput.value.length;
            charCounter.textContent = `${length} / 300`;
            
            charCounter.classList.remove('warning', 'danger');
            if (length >= 250) {
                charCounter.classList.add('danger');
            } else if (length >= 200) {
                charCounter.classList.add('warning');
            }

            postBtn.disabled = length === 0;
        }

        // Post Confession
        postBtn.addEventListener('click', postConfession);

        confessionInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                postConfession();
            }
        });

        function postConfession() {
            const text = confessionInput.value.trim();
            
            if (!text) {
                showToast('Please write something first!', 'вҡ пёҸ');
                return;
            }

            const confession = {
                id: Date.now(),
                text: text,
                category: categorySelect.value,
                timestamp: new Date().toISOString(),
                likes: 0,
                liked: false,
                reactions: {
                    'вқӨпёҸ': 0,
                    'рҹҳў': 0,
                    'рҹҳӮ': 0,
                    'рҹҳ®': 0
                },
                userReaction: null
            };

            confessions.unshift(confession);
            saveConfessions();
            
            confessionInput.value = '';
            updateCharCounter();
            
            renderConfessions();
            showToast('Confession posted anonymously!');
        }

        // Render Confessions
        function renderConfessions() {
            const filtered = currentFilter === 'all' 
                ? confessions 
                : confessions.filter(c => c.category === currentFilter);

            if (filtered.length === 0) {
                feedSection.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">рҹ“қ</div>
                        <h3>No confessions yet</h3>
                        <p>Be the first to share your thoughts anonymously!</p>
                    </div>
                `;
                return;
            }

            feedSection.innerHTML = filtered.map(confession => createConfessionCard(confession)).join('');
        }

        function createConfessionCard(confession) {
            const timeAgo = getTimeAgo(confession.timestamp);
            const categoryLabels = {
                love: 'рҹ’• Love',
                school: 'рҹ“ҡ School',
                secrets: 'рҹӨ« Secrets',
                work: 'рҹ’ј Work',
                family: 'рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§вҖҚрҹ‘Ұ Family',
                other: 'вңЁ Other'
            };

            return `
                <article class="confession-card" data-id="${confession.id}">
                    <div class="card-header">
                        <div class="card-meta">
                            <span class="category-tag ${confession.category}">${categoryLabels[confession.category]}</span>
                            <span class="timestamp">${timeAgo}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteConfession(${confession.id})" title="Delete">
                            рҹ—‘пёҸ
                        </button>
                    </div>
                    <p class="confession-text">${escapeHtml(confession.text)}</p>
                    <div class="card-actions">
                        <button class="action-btn ${confession.liked ? 'liked' : ''}" onclick="toggleLike(${confession.id})">
                            <span>${confession.liked ? 'вқӨпёҸ' : 'рҹӨҚ'}</span>
                            <span>${confession.likes}</span>
                        </button>
                        <div class="emoji-reactions">
                            <button class="emoji-btn ${confession.userReaction === 'вқӨпёҸ' ? 'active' : ''}" onclick="addReaction(${confession.id}, 'вқӨпёҸ')">вқӨпёҸ</button>
                            <button class="emoji-btn ${confession.userReaction === 'рҹҳў' ? 'active' : ''}" onclick="addReaction(${confession.id}, 'рҹҳў')">рҹҳў</button>
                            <button class="emoji-btn ${confession.userReaction === 'рҹҳӮ' ? 'active' : ''}" onclick="addReaction(${confession.id}, 'рҹҳӮ')">рҹҳӮ</button>
                            <button class="emoji-btn ${confession.userReaction === 'рҹҳ®' ? 'active' : ''}" onclick="addReaction(${confession.id}, 'рҹҳ®')">рҹҳ®</button>
                        </div>
                    </div>
                </article>
            `;
        }

        // Filter Functionality
        filterSection.addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                renderConfessions();
            }
        });

        // Like Functionality
        window.toggleLike = function(id) {
            const confession = confessions.find(c => c.id === id);
            if (confession) {
                confession.liked = !confession.liked;
                confession.likes += confession.liked ? 1 : -1;
                saveConfessions();
                renderConfessions();
            }
        };

        // Emoji Reactions
        window.addReaction = function(id, emoji) {
            const confession = confessions.find(c => c.id === id);
            if (confession) {
                if (confession.userReaction === emoji) {
                    confession.reactions[emoji]--;
                    confession.userReaction = null;
                } else {
                    if (confession.userReaction) {
                        confession.reactions[confession.userReaction]--;
                    }
                    confession.reactions[emoji]++;
                    confession.userReaction = emoji;
                }
                saveConfessions();
                renderConfessions();
            }
        };

        // Delete Functionality
        window.deleteConfession = function(id) {
            if (confirm('Are you sure you want to delete this confession?')) {
                confessions = confessions.filter(c => c.id !== id);
                saveConfessions();
                renderConfessions();
                showToast('Confession deleted', 'рҹ—‘пёҸ');
            }
        };

        // Theme Toggle
        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            localStorage.setItem('safespace_darkmode', isDarkMode);
            applyTheme();
        });

        function applyTheme() {
            if (isDarkMode) {
                document.body.classList.remove('light-mode');
                themeToggle.textContent = 'рҹҢҷ';
                themeToggle.title = 'Switch to Light Mode';
            } else {
                document.body.classList.add('light-mode');
                themeToggle.textContent = 'вҳҖпёҸ';
                themeToggle.title = 'Switch to Dark Mode';
            }
        }

        // Utility Functions
        function saveConfessions() {
            localStorage.setItem('safespace_confessions', JSON.stringify(confessions));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getTimeAgo(timestamp) {
            const now = new Date();
            const past = new Date(timestamp);
            const diffMs = now - past;
            const diffSecs = Math.floor(diffMs / 1000);
            const diffMins = Math.floor(diffSecs / 60);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffSecs < 60) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return past.toLocaleDateString();
        }

        function showToast(message, icon = 'вң…') {
            toastMessage.textContent = message;
            toast.querySelector('.toast-icon').textContent = icon;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
