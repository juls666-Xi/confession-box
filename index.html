<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSpace Confessions - Share Anonymously</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(30, 30, 50, 0.6);
            --bg-input: rgba(40, 40, 60, 0.8);
            --text-primary: #ffffff;
            --text-secondary: #b8b8d1;
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        .light-mode {
            --bg-primary: #f8f9fc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --bg-input: rgba(240, 240, 245, 0.9);
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --glass-border: rgba(0, 0, 0, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(99, 102, 241, 0.1) 0%, transparent 40%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        /* Header */
        header {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .icon-btn:hover {
            background: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        /* Main Container */
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Input Section */
        .input-section {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .input-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .anonymous-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: rgba(16, 185, 129, 0.1);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
        }

        .anonymous-badge::before {
            content: '🔒';
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        textarea::placeholder {
            color: var(--text-secondary);
        }

        .input-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .category-picker {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .category-option {
            padding: 0.5rem 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            background: var(--bg-input);
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-option:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .category-option.selected {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
        }

        .char-counter {
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .char-counter.warning {
            color: var(--warning);
        }

        .char-counter.danger {
            color: var(--danger);
        }

        .post-btn {
            padding: 0.75rem 2rem;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .post-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        .post-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Filter Section */
        .filter-section {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            background: var(--bg-card);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
        }

        /* Feed Section */
        .feed-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .confession-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            animation: fadeInUp 0.5s ease;
            transition: all 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .confession-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .category-tag {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .category-tag.love { background: rgba(236, 72, 153, 0.2); color: #ec4899; }
        .category-tag.school { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .category-tag.secrets { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
        .category-tag.work { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .category-tag.family { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .category-tag.other { background: rgba(107, 114, 128, 0.2); color: #9ca3af; }

        .timestamp {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .delete-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .confession-text {
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .card-actions {
            display: flex;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
            flex-wrap: wrap;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .action-btn.liked {
            background: rgba(236, 72, 153, 0.1);
            border-color: rgba(236, 72, 153, 0.3);
            color: #ec4899;
        }

        .action-btn.liked:hover {
            background: rgba(236, 72, 153, 0.2);
        }

        .emoji-reactions {
            display: flex;
            gap: 0.5rem;
            margin-left: auto;
        }

        .emoji-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: transparent;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .emoji-btn:hover {
            background: var(--bg-input);
            transform: scale(1.15);
        }

        .emoji-btn.active {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        /* Comments Section */
        .comments-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .comments-header h4 {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .toggle-comments {
            background: transparent;
            border: none;
            color: var(--accent-primary);
            cursor: pointer;
            font-size: 0.85rem;
        }

        .comment-input-container {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .comment-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
        }

        .comment-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .comment-submit {
            padding: 0.75rem 1.5rem;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .comment-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .comment {
            background: var(--bg-input);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .comment-anonymous {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .comment-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .comment-text {
            color: var(--text-primary);
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .no-comments {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Share Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .share-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .share-option {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: var(--bg-input);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .share-option:hover {
            background: var(--bg-card);
            border-color: var(--accent-primary);
        }

        .share-option-icon {
            font-size: 1.5rem;
        }

        .share-link-container {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--bg-input);
            border-radius: 12px;
        }

        .share-link {
            display: flex;
            gap: 0.5rem;
        }

        .share-link input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .copy-btn {
            padding: 0.75rem 1rem;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            margin-top: 2rem;
            border-top: 1px solid var(--glass-border);
        }

        .footer-message {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-style: italic;
            max-width: 500px;
            margin: 0 auto;
        }

        .footer-message::before {
            content: '"';
            font-size: 2rem;
            color: var(--accent-primary);
            line-height: 0;
            vertical-align: middle;
            margin-right: 0.25rem;
        }

        .footer-message::after {
            content: '"';
            font-size: 2rem;
            color: var(--accent-primary);
            line-height: 0;
            vertical-align: middle;
            margin-left: 0.25rem;
        }

        .footer-heart {
            margin-top: 1rem;
            font-size: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            font-size: 1.25rem;
        }

        /* Live Indicator */
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--success);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Reaction Count */
        .reaction-count {
            font-size: 0.8rem;
            margin-left: 0.25rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header {
                padding: 1rem;
            }

            .logo h1 {
                font-size: 1.2rem;
            }

            main {
                padding: 1rem;
            }

            .input-section {
                padding: 1rem;
            }

            .input-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .post-btn {
                width: 100%;
                justify-content: center;
            }

            .confession-card {
                padding: 1rem;
            }

            .emoji-reactions {
                display: none;
            }

            .card-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">💜</div>
                <h1>SafeSpace Confessions</h1>
            </div>
            <div class="header-actions">
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    <span>Live</span>
                </div>
                <button class="icon-btn" id="refreshBtn" title="Refresh Confessions">
                    🔄
                </button>
                <button class="icon-btn" id="themeToggle" title="Toggle Dark Mode">
                    🌙
                </button>
            </div>
        </div>
    </header>

    <main>
        <!-- Input Section -->
        <section class="input-section">
            <div class="input-header">
                <h2>Share Your Thoughts</h2>
                <span class="anonymous-badge">Anonymous</span>
            </div>
            <textarea
                id="confessionInput"
                placeholder="What's on your mind? Share your thoughts anonymously..."
                maxlength="1000"
            ></textarea>
            <div class="category-picker" id="categoryPicker">
                <span class="category-option selected" data-category="other">Other</span>
                <span class="category-option" data-category="love">💕 Love</span>
                <span class="category-option" data-category="school">📚 School</span>
                <span class="category-option" data-category="work">💼 Work</span>
                <span class="category-option" data-category="family">👨‍👩‍👧 Family</span>
                <span class="category-option" data-category="secrets">🤫 Secrets</span>
            </div>
            <div class="input-controls">
                <span class="char-counter" id="charCounter">0 / 1000</span>
                <button class="post-btn" id="postBtn">
                    <span>📤</span> Post Confession
                </button>
            </div>
        </section>

        <!-- Filter Section -->
        <section class="filter-section" id="filterSection">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="love">💕 Love</button>
            <button class="filter-btn" data-filter="school">📚 School</button>
            <button class="filter-btn" data-filter="work">💼 Work</button>
            <button class="filter-btn" data-filter="family">👨‍👩‍👧 Family</button>
            <button class="filter-btn" data-filter="secrets">🤫 Secrets</button>
            <button class="filter-btn" data-filter="other">Other</button>
        </section>

        <!-- Feed Section -->
        <section class="feed-section" id="feedSection">
            <!-- Confessions will be dynamically added here -->
        </section>
    </main>

    <footer>
        <p class="footer-message">You're not alone. Someone out there understands.</p>
        <div class="footer-heart">💜</div>
    </footer>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-icon">✅</span>
        <span id="toastMessage">Confession posted!</span>
    </div>

    <!-- Share Modal -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Share Confession</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="share-options">
                <div class="share-option" id="shareTwitter">
                    <span class="share-option-icon">🐦</span>
                    <span>Share on Twitter</span>
                </div>
                <div class="share-option" id="shareFacebook">
                    <span class="share-option-icon">📘</span>
                    <span>Share on Facebook</span>
                </div>
                <div class="share-option" id="shareWhatsApp">
                    <span class="share-option-icon">📱</span>
                    <span>Share on WhatsApp</span>
                </div>
                <div class="share-link-container">
                    <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Or copy link:</p>
                    <div class="share-link">
                        <input type="text" id="shareLinkInput" readonly>
                        <button class="copy-btn" id="copyLinkBtn">Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let confessions = [];
        let filteredConfessions = [];
        let currentFilter = 'all';
        let selectedCategory = 'other';
        let isDarkMode = localStorage.getItem('safespace_darkmode') !== 'false';
        let userReactions = JSON.parse(localStorage.getItem('safespace_reactions') || '{}');
        let autoRefreshInterval;

        // DOM Elements
        const confessionInput = document.getElementById('confessionInput');
        const charCounter = document.getElementById('charCounter');
        const postBtn = document.getElementById('postBtn');
        const feedSection = document.getElementById('feedSection');
        const themeToggle = document.getElementById('themeToggle');
        const refreshBtn = document.getElementById('refreshBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const filterSection = document.getElementById('filterSection');
        const categoryPicker = document.getElementById('categoryPicker');
        const shareModal = document.getElementById('shareModal');
        const modalClose = document.getElementById('modalClose');
        const shareLinkInput = document.getElementById('shareLinkInput');
        const copyLinkBtn = document.getElementById('copyLinkBtn');

        // API Configuration - Update this with your Render/Railway backend URL
        // For local development, leave empty or use 'http://localhost:3000'
        // For production, use your deployed backend URL (e.g., 'https://your-app.onrender.com')
        const API_URL = 'https://confession-box-6c01.onrender.com';

        // Helper function to build API URLs
        function getApiUrl(path) {
            return API_URL ? `${API_URL}${path}` : path;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            applyTheme();
            loadConfessions();
            updateCharCounter();
            setupEventListeners();
            startAutoRefresh();
        });

        // Category Selection
        categoryPicker.addEventListener('click', (e) => {
            if (e.target.classList.contains('category-option')) {
                document.querySelectorAll('.category-option').forEach(opt => opt.classList.remove('selected'));
                e.target.classList.add('selected');
                selectedCategory = e.target.dataset.category;
            }
        });

        // Character Counter
        confessionInput.addEventListener('input', updateCharCounter);

        function updateCharCounter() {
            const length = confessionInput.value.length;
            charCounter.textContent = `${length} / 1000`;

            charCounter.classList.remove('warning', 'danger');
            if (length >= 900) {
                charCounter.classList.add('danger');
            } else if (length >= 750) {
                charCounter.classList.add('warning');
            }

            postBtn.disabled = length === 0;
        }

        // Post Confession
        postBtn.addEventListener('click', postConfession);

        confessionInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                postConfession();
            }
        });

        async function postConfession() {
            const content = confessionInput.value.trim();

            if (!content) {
                showToast('Please write something first!', '⚠️');
                return;
            }

            if (content.length > 1000) {
                showToast('Confession is too long!', '⚠️');
                return;
            }

            postBtn.disabled = true;
            postBtn.innerHTML = '<span>⏳</span> Posting...';

            try {
                const response = await fetch(getApiUrl('/api/confessions'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ content, category: selectedCategory }),
                });

                if (response.ok) {
                    confessionInput.value = '';
                    updateCharCounter();
                    await loadConfessions();
                    showToast('Confession posted anonymously! 💜');
                } else {
                    const error = await response.json();
                    showToast(error.error || 'Failed to post confession', '❌');
                }
            } catch (error) {
                // For demo/gh-pages: store locally if backend unavailable
                storeLocalConfession(content);
                confessionInput.value = '';
                updateCharCounter();
                showToast('Confession posted! (Demo mode) 💜');
            } finally {
                postBtn.disabled = false;
                postBtn.innerHTML = '<span>📤</span> Post Confession';
            }
        }

        function storeLocalConfession(content) {
            const newConfession = {
                _id: 'local_' + Date.now(),
                content: content,
                category: selectedCategory,
                timestamp: new Date().toISOString(),
                reactions: { like: 0, support: 0, pray: 0, fire: 0 },
                comments: []
            };
            confessions.unshift(newConfession);
            filterConfessions();
            renderConfessions();
        }

        // Load Confessions
        async function loadConfessions() {
            try {
                const response = await fetch(getApiUrl('/api/confessions'));
                if (response.ok) {
                    confessions = await response.json();
                    filterConfessions();
                    renderConfessions();
                } else {
                    // Demo mode - use local storage
                    loadLocalConfessions();
                }
            } catch (error) {
                loadLocalConfessions();
            }
        }

        function loadLocalConfessions() {
            const local = localStorage.getItem('safespace_confessions');
            if (local) {
                confessions = JSON.parse(local);
            }
            filterConfessions();
            renderConfessions();
        }

        function saveLocalConfessions() {
            localStorage.setItem('safespace_confessions', JSON.stringify(confessions));
        }

        // Filter Confessions
        function filterConfessions() {
            if (currentFilter === 'all') {
                filteredConfessions = [...confessions];
            } else {
                filteredConfessions = confessions.filter(c => c.category === currentFilter);
            }
        }

        // Render Confessions
        function renderConfessions() {
            if (filteredConfessions.length === 0) {
                feedSection.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <h3>No confessions yet</h3>
                        <p>Be the first to share your thoughts anonymously!</p>
                    </div>
                `;
                return;
            }

            feedSection.innerHTML = filteredConfessions.map(confession => createConfessionCard(confession)).join('');
        }

        function createConfessionCard(confession) {
            const timeAgo = getTimeAgo(confession.timestamp);
            const categoryClass = confession.category || 'other';
            const categoryEmoji = getCategoryEmoji(confession.category);
            const userReaction = userReactions[confession._id] || null;
            const reactions = confession.reactions || { like: 0, support: 0, pray: 0, fire: 0 };

            return `
                <article class="confession-card" data-id="${confession._id}">
                    <div class="card-header">
                        <div class="card-meta">
                            <span class="category-tag ${categoryClass}">${categoryEmoji} ${confession.category || 'Other'}</span>
                            <span class="timestamp">${timeAgo}</span>
                        </div>
                    </div>
                    <p class="confession-text">${escapeHtml(confession.content)}</p>
                    <div class="card-actions">
                        <button class="action-btn ${userReaction === 'like' ? 'liked' : ''}" onclick="addReaction('${confession._id}', 'like')">
                            💜 <span class="reaction-count">${reactions.like || 0}</span>
                        </button>
                        <button class="action-btn ${userReaction === 'support' ? 'liked' : ''}" onclick="addReaction('${confession._id}', 'support')">
                            🤗 <span class="reaction-count">${reactions.support || 0}</span>
                        </button>
                        <button class="action-btn ${userReaction === 'pray' ? 'liked' : ''}" onclick="addReaction('${confession._id}', 'pray')">
                            🙏 <span class="reaction-count">${reactions.pray || 0}</span>
                        </button>
                        <button class="action-btn ${userReaction === 'fire' ? 'liked' : ''}" onclick="addReaction('${confession._id}', 'fire')">
                            🔥 <span class="reaction-count">${reactions.fire || 0}</span>
                        </button>
                        <button class="action-btn" onclick="toggleComments('${confession._id}')">
                            💬 <span class="reaction-count">${confession.comments ? confession.comments.length : 0}</span>
                        </button>
                        <button class="action-btn" onclick="openShareModal('${confession._id}')">
                            🔗 Share
                        </button>
                    </div>
                    <div class="comments-section" id="comments-${confession._id}" style="display: none;">
                        <div class="comments-header">
                            <h4>Comments (${confession.comments ? confession.comments.length : 0})</h4>
                        </div>
                        <div class="comment-input-container">
                            <input type="text" class="comment-input" placeholder="Add an anonymous comment..." id="comment-input-${confession._id}">
                            <button class="comment-submit" onclick="addComment('${confession._id}')">Send</button>
                        </div>
                        <div class="comments-list" id="comments-list-${confession._id}">
                            ${renderComments(confession.comments || [])}
                        </div>
                    </div>
                </article>
            `;
        }

        function getCategoryEmoji(category) {
            const emojis = {
                love: '💕',
                school: '📚',
                work: '💼',
                family: '👨‍👩‍👧',
                secrets: '🤫',
                other: '📝'
            };
            return emojis[category] || '📝';
        }

        function renderComments(comments) {
            if (comments.length === 0) {
                return '<p class="no-comments">No comments yet. Be the first to show support!</p>';
            }
            return comments.map(comment => `
                <div class="comment">
                    <div class="comment-header">
                        <span class="comment-anonymous">Anonymous</span>
                        <span class="comment-time">${getTimeAgo(comment.timestamp)}</span>
                    </div>
                    <p class="comment-text">${escapeHtml(comment.content)}</p>
                </div>
            `).join('');
        }

        // Add Reaction
        window.addReaction = async function(confessionId, reactionType) {
            const confession = confessions.find(c => c._id === confessionId);
            if (!confession) return;

            const previousReaction = userReactions[confessionId];
            
            // Remove previous reaction if exists
            if (previousReaction && confession.reactions) {
                confession.reactions[previousReaction] = Math.max(0, (confession.reactions[previousReaction] || 0) - 1);
            }

            // Add new reaction if different
            if (previousReaction !== reactionType) {
                if (!confession.reactions) confession.reactions = { like: 0, support: 0, pray: 0, fire: 0 };
                confession.reactions[reactionType] = (confession.reactions[reactionType] || 0) + 1;
                userReactions[confessionId] = reactionType;
            } else {
                delete userReactions[confessionId];
            }

            localStorage.setItem('safespace_reactions', JSON.stringify(userReactions));

            // Try to save to backend
            try {
                await fetch(getApiUrl(`/api/confessions/${confessionId}/react`), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reactionType, reactions: confession.reactions })
                });
            } catch (e) {
                saveLocalConfessions();
            }

            filterConfessions();
            renderConfessions();
        };

        // Toggle Comments
        window.toggleComments = function(confessionId) {
            const commentsSection = document.getElementById(`comments-${confessionId}`);
            const isVisible = commentsSection.style.display !== 'none';
            commentsSection.style.display = isVisible ? 'none' : 'block';
        };

        // Add Comment
        window.addComment = async function(confessionId) {
            const input = document.getElementById(`comment-input-${confessionId}`);
            const content = input.value.trim();

            if (!content) {
                showToast('Please write a comment!', '⚠️');
                return;
            }

            const confession = confessions.find(c => c._id === confessionId);
            if (!confession) return;

            if (!confession.comments) confession.comments = [];

            const newComment = {
                _id: 'comment_' + Date.now(),
                content: content,
                timestamp: new Date().toISOString()
            };

            confession.comments.push(newComment);
            input.value = '';

            // Try to save to backend
            try {
                await fetch(getApiUrl(`/api/confessions/${confessionId}/comment`), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comment: newComment, comments: confession.comments })
                });
            } catch (e) {
                saveLocalConfessions();
            }

            filterConfessions();
            renderConfessions();
            showToast('Comment added anonymously! 💜');
            
            // Keep comments section open
            setTimeout(() => {
                const commentsSection = document.getElementById(`comments-${confessionId}`);
                if (commentsSection) commentsSection.style.display = 'block';
            }, 0);
        };

        // Share Modal
        window.openShareModal = function(confessionId) {
            const confession = confessions.find(c => c._id === confessionId);
            if (!confession) return;

            const shareUrl = window.location.href;
            shareLinkInput.value = shareUrl;
            shareModal.classList.add('active');
        };

        modalClose.addEventListener('click', () => {
            shareModal.classList.remove('active');
        });

        shareModal.addEventListener('click', (e) => {
            if (e.target === shareModal) {
                shareModal.classList.remove('active');
            }
        });

        document.getElementById('shareTwitter').addEventListener('click', () => {
            const text = encodeURIComponent('Check out this anonymous confession on SafeSpace 💜');
            const url = encodeURIComponent(window.location.href);
            window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
            shareModal.classList.remove('active');
        });

        document.getElementById('shareFacebook').addEventListener('click', () => {
            const url = encodeURIComponent(window.location.href);
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
            shareModal.classList.remove('active');
        });

        document.getElementById('shareWhatsApp').addEventListener('click', () => {
            const text = encodeURIComponent('Check out SafeSpace Confessions 💜 ' + window.location.href);
            window.open(`https://wa.me/?text=${text}`, '_blank');
            shareModal.classList.remove('active');
        });

        copyLinkBtn.addEventListener('click', () => {
            shareLinkInput.select();
            document.execCommand('copy');
            showToast('Link copied to clipboard! 📋');
        });

        // Filter Buttons
        filterSection.addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                filterConfessions();
                renderConfessions();
            }
        });

        // Theme Toggle
        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            localStorage.setItem('safespace_darkmode', isDarkMode);
            applyTheme();
        });

        function applyTheme() {
            if (isDarkMode) {
                document.body.classList.remove('light-mode');
                themeToggle.textContent = '🌙';
                themeToggle.title = 'Switch to Light Mode';
            } else {
                document.body.classList.add('light-mode');
                themeToggle.textContent = '☀️';
                themeToggle.title = 'Switch to Dark Mode';
            }
        }

        // Refresh Button
        refreshBtn.addEventListener('click', async () => {
            refreshBtn.style.animation = 'spin 0.5s ease';
            await loadConfessions();
            setTimeout(() => {
                refreshBtn.style.animation = '';
            }, 500);
            showToast('Confessions refreshed! 🔄');
        });

        // Auto Refresh
        function startAutoRefresh() {
            autoRefreshInterval = setInterval(() => {
                loadConfessions();
            }, 30000); // Refresh every 30 seconds
        }

        // Setup Event Listeners
        function setupEventListeners() {
            // Close modal on escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    shareModal.classList.remove('active');
                }
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getTimeAgo(timestamp) {
            const now = new Date();
            const past = new Date(timestamp);
            const diffMs = now - past;
            const diffSecs = Math.floor(diffMs / 1000);
            const diffMins = Math.floor(diffSecs / 60);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffSecs < 60) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return past.toLocaleDateString();
        }

        function showToast(message, icon = '✅') {
            toastMessage.textContent = message;
            toast.querySelector('.toast-icon').textContent = icon;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
